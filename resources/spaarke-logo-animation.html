<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spaarke Logo Animation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    background: #0c0c0c;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: visible;
  }
  .wrapper {
    width: 100%;
    max-width: 900px;
    overflow: visible;
  }
  .wrapper svg {
    width: 100%;
    height: auto;
    overflow: visible;
    display: block;
  }

  /* --- Laser clip-path reveal --- */
  #spaarke-laser {
    animation: laser-reveal 1.2s linear forwards;
  }
  @keyframes laser-reveal {
    0%   { clip-path: inset(0 100% 0 0); }
    35%  { clip-path: inset(0 0% 0 0); }
    100% { clip-path: inset(0 0 0 100%); }
  }

  /* --- Dot fade out --- */
  .ska-dot-fade {
    animation: dot-fadeout 0.6s ease-out 1.05s forwards;
  }
  @keyframes dot-fadeout {
    0%   { opacity: 1; }
    100% { opacity: 0; }
  }

  /* --- Spark burst --- */
  .ska-spark {
    transform-box: fill-box;
    transform-origin: center;
    animation: spark-burst 0.25s ease-out 0.40s both;
  }
  @keyframes spark-burst {
    0%   { transform: scale(0); opacity: 1; }
    25%  { transform: scale(3); opacity: 0.8; }
    100% { transform: scale(6); opacity: 0; }
  }

  /* --- Flare expand --- */
  .ska-flare {
    transform-box: fill-box;
    transform-origin: center;
    animation: flare-expand 0.35s cubic-bezier(.1,.8,.2,1) 0.42s both;
  }
  @keyframes flare-expand {
    0%   { transform: scale(0); opacity: 1; }
    100% { transform: scale(10); opacity: 0; }
  }

  /* --- Full logo fade-in --- */
  .ska-full-logo {
    opacity: 0;
    transform-origin: 2700px 809px;
    transform: scale(0.7);
    animation: logo-fadein 1.2s ease-out 1.7s forwards;
  }
  @keyframes logo-fadein {
    0%   { opacity: 0; transform: scale(0.7); }
    100% { opacity: 1; transform: scale(1); }
  }
</style>
</head>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var svg = document.querySelector('svg');
  var rects = svg.querySelectorAll('.ska-beam-rect');
  var cancelled = false;

  var DELAY = 420;
  var EXTEND = 250;
  var HOLD = 400;
  var FADE = 600;
  var PEAK_WIDTH = 5000;
  var start = performance.now();

  // Pre-read each rect's center X
  var centers = [];
  rects.forEach(function(r) {
    centers.push(parseFloat(r.dataset.cx || '0'));
  });

  function easeOutCubic(t) {
    return 1 - Math.pow(1 - t, 3);
  }

  function setBeams(w, opacity) {
    rects.forEach(function(r, i) {
      var cx = centers[i];
      r.setAttribute('x', String(cx - w / 2));
      r.setAttribute('width', String(w));
      r.setAttribute('opacity', opacity);
    });
  }

  function tick(now) {
    if (cancelled) return;
    var elapsed = now - start - DELAY;

    if (elapsed < 0) {
      setBeams(0, '0');
      requestAnimationFrame(tick);
      return;
    }

    if (elapsed < EXTEND) {
      var w = PEAK_WIDTH * easeOutCubic(elapsed / EXTEND);
      setBeams(w, '1');
    } else if (elapsed < EXTEND + HOLD) {
      setBeams(PEAK_WIDTH, '1');
    } else if (elapsed < EXTEND + HOLD + FADE) {
      var opacity = String(1 - (elapsed - EXTEND - HOLD) / FADE);
      setBeams(PEAK_WIDTH, opacity);
    } else {
      setBeams(PEAK_WIDTH, '0');
      return;
    }

    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);
});
</script>
